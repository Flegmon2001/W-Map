<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interactive World Map</title>

  <!-- D3 + TopoJSON -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      overflow:hidden;
      height:100vh;
      display:flex;
      flex-direction:column;
    }

    /* =========================
       TOP NAV
    ========================== */
    nav{
      width:100%;
      height:80px;
      background:#111827;
      border-bottom:2px solid #1e293b;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:25px;
      z-index:10;
    }

    .nav-placeholder{
      width:200px;
      height:50px;
      border-radius:14px;
      background:#1e293b;
      border:2px dashed #475569;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#cbd5e1;
      transition:0.25s;
      cursor:pointer;
    }

    .nav-placeholder:hover{
      background:#334155;
      transform:translateY(-3px);
    }

    /* =========================
       MAP
    ========================== */
    #map-container{
      flex:1;
      width:100%;
      position:relative;
    }

    svg{
      width:100%;
      height:100%;
      background:
        radial-gradient(circle at center,
        #1e3a8a 0%,
        #0f172a 100%);
    }

    .country{
      fill:#38bdf8;
      stroke:#0f172a;
      stroke-width:0.6px;
      cursor:pointer;
      transition:
        fill 0.25s ease,
        transform 0.25s ease,
        filter 0.25s ease;
      transform-origin:center;
    }

    .country:hover{
      fill:#22c55e;
      filter:brightness(1.15);
      transform:translateY(-3px);
    }

    .tooltip{
      position:absolute;
      background:#111827;
      border:1px solid #334155;
      padding:8px 12px;
      border-radius:10px;
      pointer-events:none;
      color:white;
      font-size:14px;
      opacity:0;
      transition:opacity 0.15s;
      white-space:nowrap;
      z-index:100;
    }

  </style>
</head>
<body>

  <!-- =========================
       NAVBAR
  ========================== -->
  <nav>
    <div class="nav-placeholder">Nav Placeholder 1</div>
    <div class="nav-placeholder">Nav Placeholder 2</div>
    <div class="nav-placeholder">Nav Placeholder 3</div>
  </nav>

  <!-- =========================
       MAP CONTAINER
  ========================== -->
  <div id="map-container">
    <div class="tooltip" id="tooltip"></div>
  </div>

  <script>

    const width = window.innerWidth;
    const height = window.innerHeight - 80;

    const svg = d3
      .select("#map-container")
      .append("svg")
      .attr("width", width)
      .attr("height", height);

    const tooltip = document.getElementById("tooltip");

    // =========================
    // PROJECTION
    // =========================
    const projection = d3.geoNaturalEarth1()
      .scale(width / 6.5)
      .translate([width / 2, height / 2]);

    const path = d3.geoPath().projection(projection);

    // =========================
    // LOAD WORLD DATA
    // =========================
    d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
      .then(data => {

        const countries = topojson.feature(
          data,
          data.objects.countries
        ).features;

        // =========================
        // DRAW COUNTRIES
        // =========================
        svg.selectAll("path")
          .data(countries)
          .enter()
          .append("path")
          .attr("d", path)
          .attr("class", "country")

          // COUNTRY ID
          .attr("data-id", d => d.id)

          // HOVER
          .on("mousemove", (event, d) => {

            const countryName =
              d.properties.name || "Unknown Country";

            tooltip.style.opacity = 1;
            tooltip.innerHTML = countryName;

            tooltip.style.left =
              (event.pageX + 15) + "px";

            tooltip.style.top =
              (event.pageY - 10) + "px";
          })

          .on("mouseleave", () => {
            tooltip.style.opacity = 0;
          })

          // CLICK
          .on("click", (event, d) => {

            const countryId = d.id;

            // Redirect to page with country ID
            // Example:
            // country.html?id=840

            window.location.href =
              `country.html?id=${countryId}`;
          });

      });

    // =========================
    // RESPONSIVE
    // =========================
    window.addEventListener("resize", () => {
      location.reload();
    });

  </script>

</body>
</html>
